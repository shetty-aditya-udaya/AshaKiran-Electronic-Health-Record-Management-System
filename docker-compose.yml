version: '3.8'

services:
  # Database Service (PostgreSQL default, fully persistent)
  db:
    image: postgres:15-alpine
    container_name: ashakiran-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ashakiran}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_secure_pass_123}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-ashakiran}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    networks:
      - ashakiran-network

  # Backend Service (Flask + Gunicorn)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ashakiran-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-production}
      FLASK_DEBUG: ${FLASK_DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-production-secret-key-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-production-jwt-secret-key-change-me}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      PORT: 5000
      # Combine database variables dynamically pointing to the container host 'db'
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_secure_pass_123}@db:5432/${DB_NAME:-ashakiran}
    volumes:
      # Persist user uploads, SQLite fallback databases, and logs
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
      - backend_instance:/app/instance
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    networks:
      - ashakiran-network

  # Frontend Service (React + Vite + Nginx Reverse Proxy)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ashakiran-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    networks:
      - ashakiran-network

volumes:
  db_data:
  backend_uploads:
  backend_logs:
  backend_instance:

networks:
  ashakiran-network:
    driver: bridge
